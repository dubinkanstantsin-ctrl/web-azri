<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Открытый урок «Грузинский за час» | AZRI</title>
  <meta name="description" content="Бесплатный онлайн-урок AZRI для тех, кто начинает учить грузинский, живет в Грузии или влюблен в Сакартвело. 28 апреля, 20:00 по Тбилиси.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700&family=Roboto+Condensed:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #000000;
      --wine: #780000;
      --red: #C11220;
      --cream: #FDF0D4;
      --ink: #002F49;
      --blue: #669BBB;
      --white: #ffffff;
      --muted: #5c5c5c;
      --line: rgba(0, 0, 0, 0.14);
      --shadow: rgba(0, 47, 73, 0.18);
      --hero-bg: url("azri-webinar-assets/open-lesson-blue.png");
      --font-main: "Roboto Condensed", "Arial Narrow", Arial, sans-serif;
      --font-georgian: "Noto Sans Georgian", "Roboto Condensed", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: var(--font-main);
      color: var(--black);
      background: var(--cream);
      line-height: 1.45;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 40px;
      background: rgba(253, 240, 212, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      color: var(--cream);
      background: var(--wine);
      font-family: var(--font-georgian);
      font-size: 30px;
      font-weight: 700;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 22px;
      font-size: 17px;
      font-weight: 600;
    }

    .nav a {
      text-decoration: none;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 13px 24px;
      border: 2px solid var(--black);
      border-radius: 8px;
      color: var(--cream);
      background: var(--black);
      font-family: var(--font-main);
      font-size: 18px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    .button:hover,
    .button:focus-visible {
      color: var(--black);
      background: var(--cream);
      transform: translateY(-2px);
    }

    .button.secondary {
      color: var(--black);
      background: transparent;
    }

    .button.secondary:hover,
    .button.secondary:focus-visible {
      color: var(--cream);
      background: var(--wine);
    }

    .hero {
      position: relative;
      min-height: 720px;
      display: grid;
      align-items: center;
      overflow: hidden;
      color: var(--cream);
      background:
        linear-gradient(90deg, rgba(0, 47, 73, 0.98) 0%, rgba(0, 47, 73, 0.86) 43%, rgba(120, 0, 0, 0.68) 100%),
        var(--hero-bg) right bottom / auto 100% no-repeat,
        var(--ink);
    }

    .hero::after {
      content: "ა";
      position: absolute;
      right: 6%;
      top: 8%;
      color: rgba(253, 240, 212, 0.16);
      font-family: var(--font-georgian);
      font-size: 190px;
      font-weight: 700;
      line-height: 1;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      width: min(1120px, calc(100% - 80px));
      margin: 0 auto;
      padding: 72px 0 88px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 22px;
      padding: 8px 12px;
      border: 1px solid rgba(253, 240, 212, 0.4);
      border-radius: 8px;
      color: var(--cream);
      background: rgba(0, 0, 0, 0.18);
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      max-width: 760px;
      margin-bottom: 26px;
      font-size: 86px;
      line-height: 0.92;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1 .highlight {
      color: var(--blue);
    }

    .hero-text {
      max-width: 700px;
      margin-bottom: 32px;
      color: rgba(253, 240, 212, 0.92);
      font-size: 26px;
      font-weight: 500;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      margin-bottom: 38px;
    }

    .hero .button {
      color: var(--black);
      background: var(--cream);
      border-color: var(--cream);
    }

    .hero .button:hover,
    .hero .button:focus-visible {
      color: var(--cream);
      background: var(--red);
      border-color: var(--red);
    }

    .event-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      max-width: 820px;
      border: 1px solid rgba(253, 240, 212, 0.35);
      background: rgba(0, 0, 0, 0.2);
    }

    .event-strip div {
      padding: 18px 20px;
      border-right: 1px solid rgba(253, 240, 212, 0.22);
    }

    .event-strip div:last-child {
      border-right: 0;
    }

    .label {
      display: block;
      margin-bottom: 5px;
      color: rgba(253, 240, 212, 0.72);
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .value {
      display: block;
      color: var(--cream);
      font-size: 22px;
      font-weight: 900;
    }

    .section {
      padding: 96px 40px;
    }

    .section.dark {
      color: var(--cream);
      background: var(--black);
    }

    .section.blue {
      color: var(--cream);
      background: var(--ink);
    }

    .section.white {
      background: var(--white);
    }

    .inner {
      width: min(1120px, 100%);
      margin: 0 auto;
    }

    .section-title {
      max-width: 760px;
      margin-bottom: 42px;
      font-size: 58px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
    }

    .lead {
      max-width: 760px;
      color: var(--muted);
      font-size: 24px;
      font-weight: 500;
    }

    .dark .lead,
    .blue .lead {
      color: rgba(253, 240, 212, 0.78);
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .result-card,
    .audience-item,
    .faq-item {
      min-height: 220px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
    }

    .result-card {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .result-card strong {
      display: block;
      margin-bottom: 18px;
      color: var(--red);
      font-size: 54px;
      line-height: 1;
      font-weight: 900;
    }

    .result-card h3,
    .audience-item h3,
    .faq-item h3 {
      margin-bottom: 12px;
      font-size: 30px;
      line-height: 1.05;
      font-weight: 900;
    }

    .result-card p,
    .audience-item p,
    .faq-item p {
      margin-bottom: 0;
      font-size: 21px;
      color: var(--muted);
    }

    .audience-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .audience-item {
      min-height: 180px;
      background: var(--cream);
    }

    .lesson-flow {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 38px;
      align-items: start;
    }

    .flow-list {
      display: grid;
      gap: 14px;
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: flow;
    }

    .flow-list li {
      counter-increment: flow;
      display: grid;
      grid-template-columns: 58px 1fr;
      gap: 16px;
      padding: 18px 0;
      border-bottom: 1px solid rgba(253, 240, 212, 0.26);
    }

    .flow-list li::before {
      content: counter(flow, decimal-leading-zero);
      color: var(--blue);
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
    }

    .flow-list strong {
      display: block;
      margin-bottom: 5px;
      font-size: 25px;
      line-height: 1.1;
    }

    .flow-list span {
      color: rgba(253, 240, 212, 0.75);
      font-size: 19px;
    }

    .quote-panel {
      position: sticky;
      top: 100px;
      padding: 34px;
      border: 1px solid rgba(253, 240, 212, 0.36);
      border-radius: 8px;
      background: var(--wine);
      box-shadow: 18px 18px 0 rgba(253, 240, 212, 0.12);
    }

    .quote-panel p {
      margin-bottom: 0;
      font-size: 34px;
      line-height: 1.05;
      font-weight: 900;
    }

    .quote-panel .georgian {
      display: block;
      margin-top: 22px;
      color: var(--cream);
      font-family: var(--font-georgian);
      font-size: 48px;
    }

    .speaker {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 42px;
      align-items: center;
    }

    .speaker-portrait {
      position: relative;
      min-height: 440px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 8px;
      color: var(--cream);
      background:
        linear-gradient(145deg, rgba(120, 0, 0, 0.92), rgba(0, 47, 73, 0.86)),
        var(--wine);
    }

    .speaker-portrait::before {
      content: "AZRI";
      position: absolute;
      left: -18px;
      bottom: 20px;
      color: rgba(253, 240, 212, 0.15);
      font-size: 130px;
      font-weight: 900;
      line-height: 0.8;
    }

    .speaker-portrait span {
      position: relative;
      display: grid;
      place-items: center;
      width: 190px;
      height: 190px;
      border: 2px solid rgba(253, 240, 212, 0.7);
      border-radius: 8px;
      font-family: var(--font-georgian);
      font-size: 128px;
      font-weight: 700;
    }

    .speaker h2 {
      margin-bottom: 18px;
      font-size: 64px;
      line-height: 0.98;
      font-weight: 900;
      text-transform: uppercase;
    }

    .speaker p {
      max-width: 700px;
      color: var(--muted);
      font-size: 25px;
      font-weight: 500;
    }

    .proof-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
      margin-top: 34px;
    }

    .proof {
      padding-top: 22px;
      border-top: 3px solid var(--red);
    }

    .proof strong {
      display: block;
      margin-bottom: 6px;
      color: var(--wine);
      font-size: 42px;
      line-height: 1;
      font-weight: 900;
    }

    .proof span {
      display: block;
      color: var(--muted);
      font-size: 19px;
      font-weight: 600;
    }

    .visual-band {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 36px;
      align-items: center;
    }

    .visual-copy h2 {
      margin-bottom: 18px;
      font-size: 56px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
    }

    .visual-copy p {
      margin-bottom: 24px;
      color: rgba(253, 240, 212, 0.78);
      font-size: 24px;
    }

    .visual-image {
      overflow: hidden;
      border: 2px solid rgba(253, 240, 212, 0.5);
      border-radius: 8px;
      background: var(--blue);
    }

    .visual-image img {
      width: 100%;
      height: 560px;
      object-fit: cover;
      object-position: center 58%;
    }

    .registration {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 44px;
      align-items: start;
    }

    .registration h2 {
      margin-bottom: 18px;
      font-size: 64px;
      line-height: 0.96;
      font-weight: 900;
      text-transform: uppercase;
    }

    .registration p {
      color: rgba(253, 240, 212, 0.78);
      font-size: 24px;
    }

    .form {
      padding: 28px;
      border: 1px solid rgba(253, 240, 212, 0.36);
      border-radius: 8px;
      background: rgba(253, 240, 212, 0.08);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: rgba(253, 240, 212, 0.82);
      font-size: 17px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 54px;
      margin-bottom: 18px;
      padding: 12px 14px;
      border: 2px solid rgba(253, 240, 212, 0.46);
      border-radius: 8px;
      color: var(--cream);
      background: rgba(0, 0, 0, 0.22);
      font-family: var(--font-main);
      font-size: 20px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(102, 155, 187, 0.25);
    }

    input::placeholder {
      color: rgba(253, 240, 212, 0.48);
    }

    .form .button {
      width: 100%;
      margin-top: 6px;
      color: var(--black);
      background: var(--cream);
      border-color: var(--cream);
    }

    .form-note {
      margin: 14px 0 0;
      color: rgba(253, 240, 212, 0.62);
      font-size: 16px;
    }

    .status {
      margin-top: 16px;
      min-height: 24px;
      color: var(--blue);
      font-size: 18px;
      font-weight: 700;
    }

    .faq-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .footer {
      padding: 28px 40px;
      color: var(--cream);
      background: var(--black);
    }

    .footer .inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .footer p {
      margin: 0;
      color: rgba(253, 240, 212, 0.7);
      font-size: 18px;
    }

    @media (max-width: 960px) {
      .site-header {
        position: static;
        align-items: flex-start;
        padding: 14px 22px;
      }

      .nav {
        display: none;
      }

      .hero {
        min-height: 680px;
        background:
          linear-gradient(180deg, rgba(0, 47, 73, 0.98), rgba(120, 0, 0, 0.74)),
          var(--hero-bg) center bottom / auto 62% no-repeat,
          var(--ink);
      }

      .hero-content {
        width: min(100% - 36px, 720px);
        padding: 48px 0 260px;
      }

      h1 {
        font-size: 58px;
      }

      .hero-text {
        font-size: 22px;
      }

      .event-strip,
      .result-grid,
      .audience-grid,
      .lesson-flow,
      .speaker,
      .proof-row,
      .visual-band,
      .registration,
      .faq-grid {
        grid-template-columns: 1fr;
      }

      .event-strip div,
      .event-strip div:last-child {
        border-right: 0;
        border-bottom: 1px solid rgba(253, 240, 212, 0.22);
      }

      .event-strip div:last-child {
        border-bottom: 0;
      }

      .section {
        padding: 70px 22px;
      }

      .section-title,
      .visual-copy h2 {
        font-size: 42px;
      }

      .speaker h2,
      .registration h2 {
        font-size: 46px;
      }

      .quote-panel {
        position: static;
      }

      .form-row {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }

    @media (max-width: 520px) {
      .button {
        width: 100%;
      }

      h1 {
        font-size: 44px;
      }

      .eyebrow {
        font-size: 15px;
      }

      .hero {
        min-height: 720px;
      }

      .hero-content {
        padding-bottom: 250px;
      }

      .section-title,
      .visual-copy h2 {
        font-size: 34px;
      }

      .speaker h2,
      .registration h2 {
        font-size: 38px;
      }

      .lead,
      .registration p,
      .visual-copy p {
        font-size: 21px;
      }

      .result-card,
      .audience-item,
      .faq-item,
      .form {
        padding: 22px;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#top" aria-label="AZRI">
      <span class="brand-mark" data-content="brand.mark"></span>
      <span><span data-content="brand.name"></span><br><span data-content="brand.subtitle"></span></span>
    </a>
    <nav class="nav" aria-label="Навигация" data-repeat="navigation"></nav>
    <a class="button secondary" href="#register" data-content="registration.fields.submit"></a>
  </header>

  <main id="top">
    <section class="hero" aria-labelledby="hero-title">
      <div class="hero-content">
        <p class="eyebrow" data-content="hero.eyebrow"></p>
        <h1 id="hero-title"><span data-content="hero.title"></span> <span class="highlight" data-content="hero.highlightedTitle"></span></h1>
        <p class="hero-text" data-content="hero.text"></p>
        <div class="hero-actions">
          <a class="button" data-content="hero.primaryCta" data-href="hero.primaryHref"></a>
          <a class="button secondary" data-content="hero.secondaryCta" data-href="hero.secondaryHref"></a>
        </div>
        <div class="event-strip" aria-label="Детали урока" data-repeat="hero.event"></div>
      </div>
    </section>

    <section class="section white" aria-labelledby="results-title">
      <div class="inner">
        <h2 class="section-title" id="results-title" data-content="results.title"></h2>
        <div class="result-grid" data-repeat="results.items"></div>
      </div>
    </section>

    <section class="section" aria-labelledby="audience-title">
      <div class="inner">
        <h2 class="section-title" id="audience-title" data-content="audience.title"></h2>
        <p class="lead" data-content="audience.lead"></p>
        <div class="audience-grid" data-repeat="audience.items"></div>
      </div>
    </section>

    <section class="section blue" id="program" aria-labelledby="program-title">
      <div class="inner lesson-flow">
        <div class="quote-panel">
          <p data-content="program.quote"></p>
          <span class="georgian" lang="ka" data-content="program.georgianWord"></span>
        </div>
        <div>
          <h2 class="section-title" id="program-title" data-content="program.title"></h2>
          <ol class="flow-list" data-repeat="program.items"></ol>
        </div>
      </div>
    </section>

    <section class="section white" id="speaker" aria-labelledby="speaker-title">
      <div class="inner speaker">
        <div class="speaker-portrait" aria-hidden="true">
          <span data-content="speaker.mark"></span>
        </div>
        <div>
          <h2 id="speaker-title" data-content="speaker.title"></h2>
          <p data-content="speaker.text"></p>
          <div class="proof-row" aria-label="Доказательства" data-repeat="speaker.proof"></div>
        </div>
      </div>
    </section>

    <section class="section dark" aria-labelledby="visual-title">
      <div class="inner visual-band">
        <div class="visual-copy">
          <h2 id="visual-title" data-content="visual.title"></h2>
          <p data-content="visual.text"></p>
          <a class="button" data-content="visual.cta" data-href="visual.href"></a>
        </div>
        <figure class="visual-image">
          <img data-image="hero.image" data-alt="visual.imageAlt" src="" alt="">
        </figure>
      </div>
    </section>

    <section class="section white" aria-labelledby="faq-title">
      <div class="inner">
        <h2 class="section-title" id="faq-title" data-content="faq.title"></h2>
        <div class="faq-grid" data-repeat="faq.items"></div>
      </div>
    </section>

    <section class="section blue" id="register" aria-labelledby="register-title">
      <div class="inner registration">
        <div>
          <h2 id="register-title" data-content="registration.title"></h2>
          <p data-content="registration.text"></p>
        </div>
        <form class="form" id="leadForm" action="#" method="post">
          <div class="form-row">
            <div>
              <label for="name" data-content="registration.fields.nameLabel"></label>
              <input id="name" name="name" autocomplete="name" required>
            </div>
            <div>
              <label for="email" data-content="registration.fields.emailLabel"></label>
              <input id="email" name="email" type="email" autocomplete="email" required>
            </div>
          </div>

          <label for="contact" data-content="registration.fields.contactLabel"></label>
          <input id="contact" name="contact" autocomplete="tel">

          <label for="segment" data-content="registration.fields.segmentLabel"></label>
          <select id="segment" name="segment"></select>

          <button class="button" type="submit" data-content="registration.fields.submit"></button>
          <p class="form-note" data-content="registration.note"></p>
          <div class="status" id="formStatus" role="status" aria-live="polite"></div>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="inner">
      <p data-content="footer.left"></p>
      <p data-content="footer.right"></p>
    </div>
  </footer>

  <script src="content.js"></script>
  <script>
    const content = window.LANDING_CONTENT;

    const get = (path) => path.split(".").reduce((value, key) => value?.[key], content);

    const setText = (selector, value) => {
      const element = document.querySelector(selector);
      if (element && value !== undefined) {
        element.textContent = value;
      }
    };

    const make = (tagName, className) => {
      const element = document.createElement(tagName);
      if (className) element.className = className;
      return element;
    };

    const renderNavigation = (items) => {
      const nav = document.querySelector('[data-repeat="navigation"]');
      nav.replaceChildren(...items.map((item) => {
        const link = make("a");
        link.href = item.href;
        link.textContent = item.label;
        return link;
      }));
    };

    const renderEvent = (items) => {
      const strip = document.querySelector('[data-repeat="hero.event"]');
      strip.replaceChildren(...items.map((item) => {
        const wrapper = make("div");
        const label = make("span", "label");
        const value = make("span", "value");
        label.textContent = item.label;
        value.textContent = item.value;
        wrapper.append(label, value);
        return wrapper;
      }));
    };

    const renderCards = (selector, items, className, withNumber = false) => {
      const container = document.querySelector(selector);
      container.replaceChildren(...items.map((item) => {
        const card = make("article", className);
        if (withNumber) {
          const number = make("strong");
          number.textContent = item.number;
          card.append(number);
        }
        const body = make("div");
        const title = make("h3");
        const text = make("p");
        title.textContent = item.title;
        text.textContent = item.text;
        body.append(title, text);
        card.append(body);
        return card;
      }));
    };

    const renderProgram = (items) => {
      const list = document.querySelector('[data-repeat="program.items"]');
      list.replaceChildren(...items.map((item) => {
        const li = make("li");
        const body = make("div");
        const title = make("strong");
        const text = make("span");
        title.textContent = item.title;
        text.textContent = item.text;
        body.append(title, text);
        li.append(body);
        return li;
      }));
    };

    const renderProof = (items) => {
      const row = document.querySelector('[data-repeat="speaker.proof"]');
      row.replaceChildren(...items.map((item) => {
        const proof = make("div", "proof");
        const value = make("strong");
        const label = make("span");
        value.textContent = item.value;
        label.textContent = item.label;
        proof.append(value, label);
        return proof;
      }));
    };

    const renderSelect = (items) => {
      const select = document.querySelector("#segment");
      select.replaceChildren(...items.map((item) => {
        const option = make("option");
        option.value = item.value;
        option.textContent = item.label;
        return option;
      }));
    };

    const renderContent = () => {
      document.title = content.meta.title;
      document.querySelector('meta[name="description"]').content = content.meta.description;
      document.documentElement.style.setProperty("--hero-bg", `url("${content.hero.image}")`);

      document.querySelectorAll("[data-content]").forEach((element) => {
        const value = get(element.dataset.content);
        if (value !== undefined) element.textContent = value;
      });

      document.querySelectorAll("[data-href]").forEach((element) => {
        const value = get(element.dataset.href);
        if (value) element.href = value;
      });

      document.querySelectorAll("[data-image]").forEach((element) => {
        const value = get(element.dataset.image);
        if (value) element.src = value;
      });

      document.querySelectorAll("[data-alt]").forEach((element) => {
        const value = get(element.dataset.alt);
        if (value) element.alt = value;
      });

      document.querySelector("#name").placeholder = content.registration.fields.namePlaceholder;
      document.querySelector("#email").placeholder = content.registration.fields.emailPlaceholder;
      document.querySelector("#contact").placeholder = content.registration.fields.contactPlaceholder;

      renderNavigation(content.navigation);
      renderEvent(content.hero.event);
      renderCards('[data-repeat="results.items"]', content.results.items, "result-card", true);
      renderCards('[data-repeat="audience.items"]', content.audience.items, "audience-item");
      renderProgram(content.program.items);
      renderProof(content.speaker.proof);
      renderCards('[data-repeat="faq.items"]', content.faq.items, "faq-item");
      renderSelect(content.registration.segmentOptions);
    };

    const setupForm = () => {
      const form = document.querySelector("#leadForm");
      const statusEl = document.querySelector("#formStatus");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const endpoint = content.registration.amocrmEndpoint;
        const data = Object.fromEntries(new FormData(form).entries());
        data.event = "open_lesson_georgian_in_hour";
        data.lesson_date = content.registration.lessonDate;

        if (!endpoint) {
          statusEl.textContent = content.registration.emptyEndpointMessage;
          console.table(data);
          return;
        }

        try {
          const response = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          if (!response.ok) {
            throw new Error("Request failed");
          }

          statusEl.textContent = content.registration.successMessage;
          form.reset();
        } catch (error) {
          statusEl.textContent = content.registration.errorMessage;
        }
      });
    };

    renderContent();
    setupForm();
  </script>
</body>
</html>
